<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pairs Challenge | Kira's English</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        
        .action-card { background: #000; border-left: 4px solid #D30000; border-radius: 8px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); width: 95%; max-width: 450px; box-sizing: border-box; }
        
        .section-header { color: #ffffff; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; border-bottom:.5px solid #D30000; padding-bottom: 6px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .progress-container { width: 100%; background: #222; height: 6px; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: #D30000; width: 0%; transition: width 0.4s ease; }
        
        .exercise-block { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #222; text-align: center; }
        
        /* Contenedor de Pares */
        .pair-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .word-box { flex: 1; background: #1a1a1a; padding: 15px 10px; border-radius: 8px; border: 2px solid #333; transition: 0.3s; }
        .word-box.active { border-color: #00FF00; background: #0a250a; transform: scale(1.02); }
        
        .word-text { font-size: 1.4rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .ipa-text { color: #D30000; font-size: 0.85rem; font-weight: 400; }
        
        /* Cambio solicitado: Blur más suave y mayor opacidad */
        .translation-small { font-size: 0.75rem; color: #888; font-style: italic; margin-top: 5px; cursor: pointer; transition: 0.3s; }
        .blur { filter: blur(2.5px); opacity: 0.8; }

        button { width: 100%; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; margin: 8px 0; border: none; transition: 0.3s; }
        
        .btn-speak { background: #D30000; color: white; box-shadow: 0 4px 15px rgba(211, 0, 0, 0.3); }
        .btn-next { background: #00FF00; color: #000; margin-top: 15px; }
        .btn-skip { background: transparent; color: #555; border: 1px solid #222; font-size: 0.7rem; }

        #feedback { margin-top: 15px; min-height: 45px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0.7); } 70% { box-shadow: 0 0 0px 20px rgba(211, 0, 0, 0); } 100% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0); } }
        .listening-active { animation: pulse-red 1.5s infinite; background-color: #ff0000 !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="action-card">
    <div class="section-header">
        <span>Minimal Pairs Challenge</span>
        <span id="counter" style="color: #D30000;">1 / 15</span>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="quiz-area">
        <div class="exercise-block">
            <p style="font-size: 0.7rem; color: #888; margin-top: 0;">Pronuncia una de las dos palabras:</p>
            
            <div class="pair-grid">
                <div class="word-box" id="box1">
                    <span class="word-text" id="w1">Soda</span>
                    <span class="ipa-text" id="ipa1">/ˈsoʊdə/</span>
                    <div class="translation-small blur" onclick="this.classList.toggle('blur')" id="s1">Soda</div>
                </div>
                <div class="word-box" id="box2">
                    <span class="word-text" id="w2">Sir</span>
                    <span class="ipa-text" id="ipa2">/sɜːr/</span>
                    <div class="translation-small blur" onclick="this.classList.toggle('blur')" id="s2">Señor</div>
                </div>
            </div>

            <button class="btn-speak" id="mic" onclick="start()">Presiona y Habla 🎤</button>
            
            <div id="feedback">Listo para escuchar.</div>

            <button id="next" class="btn-next hidden" onclick="go()">Siguiente Par ➔</button>
            <button id="skip" class="btn-skip" onclick="go()">Saltar Par</button>
        </div>
    </div>
</div>

<script>
    const data = [
        { a: "soda", b: "sir", ipaA: "/ˈsoʊdə/", ipaB: "/sɜːr/", sA: "Soda", sB: "Señor" },
        { a: "bird", b: "beer", ipaA: "/bɜːrd/", ipaB: "/bɪər/", sA: "Pájaro", sB: "Cerveza" },
        { a: "bought", b: "boat", ipaA: "/bɔːt/", ipaB: "/boʊt/", sA: "Compró", sB: "Bote" },
        { a: "not", b: "note", ipaA: "/nɒt/", ipaB: "/noʊt/", sA: "No", sB: "Nota" },
        { a: "cup", b: "cap", ipaA: "/kʌp/", ipaB: "/kæp/", sA: "Taza", sB: "Gorra" },
        { a: "dark", b: "duck", ipaA: "/dɑːrk/", ipaB: "/dʌk/", sA: "Oscuro", sB: "Pato" },
        { a: "cat", b: "cut", ipaA: "/kæt/", ipaB: "/kʌt/", sA: "Gato", sB: "Cortar" },
        { a: "bed", b: "bad", ipaA: "/bed/", ipaB: "/bæd/", sA: "Cama", sB: "Malo" },
        { a: "ship", b: "sheep", ipaA: "/ʃɪp/", ipaB: "/ʃiːp/", sA: "Barco", sB: "Oveja" },
        { a: "sheet", b: "shit", ipaA: "/ʃiːt/", ipaB: "/ʃɪt/", sA: "Hoja / Sábana", sB: "Mierda" },
        { a: "pool", b: "pull", ipaA: "/puːl/", ipaB: "/pʊl/", sA: "Piscina", sB: "Jalar" },
        { a: "book", b: "buck", ipaA: "/bʊk/", ipaB: "/bʌk/", sA: "Libro", sB: "Dólar / Macho" },
        { a: "cot", b: "coat", ipaA: "/kɒt/", ipaB: "/koʊt/", sA: "Catre", sB: "Abrigo" },
        { a: "heart", b: "hurt", ipaA: "/hɑːrt/", ipaB: "/hɜːrt/", sA: "Corazón", sB: "Herir" },
        { a: "hot", b: "hat", ipaA: "/hɒt/", ipaB: "/hæt/", sA: "Caliente", sB: "Sombrero" }
    ];

    let idx = 0;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = Recognition ? new Recognition() : null;
    if(rec) { rec.lang = 'en-US'; rec.continuous = false; }

    function start() {
        if (!rec) return alert("Micro no compatible.");
        resetBoxes();
        try { rec.start(); } catch(e) {}
        const micBtn = document.getElementById('mic');
        micBtn.classList.add('listening-active');
        micBtn.innerText = "Escuchando... 🎤";
    }

    rec.onresult = (e) => {
        const heard = e.results[0][0].transcript.toLowerCase().trim();
        const wordA = data[idx].a.toLowerCase();
        const wordB = data[idx].b.toLowerCase();
        const fb = document.getElementById('feedback');

        if (heard.includes(wordA)) {
            document.getElementById('box1').classList.add('active');
            fb.innerHTML = `<span style="color:#00FF00">Entendí: "${data[idx].a}" ✅</span>`;
            showNext();
        } else if (heard.includes(wordB)) {
            document.getElementById('box2').classList.add('active');
            fb.innerHTML = `<span style="color:#00FF00">Entendí: "${data[idx].b}" ✅</span>`;
            showNext();
        } else {
            fb.innerHTML = `<span style="color:#D30000">Escuché: "${heard}"... intenta de nuevo.</span>`;
        }
    };

    function showNext() {
        document.getElementById('next').classList.remove('hidden');
        document.getElementById('skip').classList.add('hidden');
    }

    rec.onend = () => {
        const micBtn = document.getElementById('mic');
        micBtn.classList.remove('listening-active');
        micBtn.innerText = "Presiona y Habla 🎤";
    };

    function resetBoxes() {
        document.getElementById('box1').classList.remove('active');
        document.getElementById('box2').classList.remove('active');
    }

    function go() {
        idx++;
        if (idx < data.length) {
            document.getElementById('w1').innerText = data[idx].a.charAt(0).toUpperCase() + data[idx].a.slice(1);
            document.getElementById('w2').innerText = data[idx].b.charAt(0).toUpperCase() + data[idx].b.slice(1);
            document.getElementById('ipa1').innerText = data[idx].ipaA;
            document.getElementById('ipa2').innerText = data[idx].ipaB;
            document.getElementById('s1').innerText = data[idx].sA;
            document.getElementById('s2').innerText = data[idx].sB;
            
            document.querySelectorAll('.translation-small').forEach(el => el.classList.add('blur'));
            resetBoxes();
            
            document.getElementById('counter').innerText = `${idx + 1} / ${data.length}`;
            document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('skip').classList.remove('hidden');
            document.getElementById('feedback').innerHTML = "Listo.";
        } else {
            document.getElementById('quiz-area').innerHTML = `<h2 style="color:#00FF00">¡RETO COMPLETADO!</h2><button class="btn-speak" onclick="location.reload()">REINICIAR</button>`;
        }
    }

    document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
</script>
</body>
</html>

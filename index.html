<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pairs Challenge | Kira's English</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        
        .action-card { background: #000; border-left: 8px solid #D30000; border-radius: 12px; padding: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); width: 95%; max-width: 900px; box-sizing: border-box; }
        
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        
        .header-title-container { display: flex; align-items: center; gap: 15px; border-bottom: 3px solid #D30000; padding-bottom: 12px; }
        .header-title-container span { color: #ffffff; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; }
        
        .logo-bracket { width: 50px; height: 50px; background: #000; border-left: 4px solid #D30000; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding-left: 6px; }
        .logo-bracket img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        
        .header-right { display: flex; align-items: center; gap: 20px; padding-bottom: 12px; white-space: nowrap; }
        #counter { font-size: 1.1rem; font-weight: 700; color: #D30000; }
        
        .progress-container { width: 100%; background: #222; height: 10px; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: #D30000; width: 0%; transition: width 0.4s ease; }
        
        .exercise-block { background: #111; padding: 40px 30px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        
        /* Contenedor de Pares Estabilizado */
        .pair-grid { display: flex; gap: 20px; margin: 25px 0; }
        .word-box { flex: 1; background: #1a1a1a; padding: 25px 15px; border-radius: 10px; border: 2px solid #333; transition: 0.3s; }
        .word-box.active { border-color: #00FF00; background: #0a250a; transform: scale(1.02); }
        
        .word-text { font-size: 2.2rem; font-weight: 700; display: block; margin-bottom: 5px; color: #ffffff; line-height: 1.1; }
        .ipa-text { color: #D30000; font-size: 1.2rem; font-weight: 700; display: block; margin-bottom: 10px; }
        
        .translation-small { font-size: 1.1rem; color: #666; font-style: italic; margin-top: 10px; cursor: pointer; transition: 0.3s; display: inline-block; }
        .translation-small:hover { color: #fff; }
        .blur { filter: blur(5px); opacity: 0.6; }

        button { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; margin: 10px auto; border: none; transition: 0.2s; display: block; }
        
        .btn-speak { background: #D30000; color: white; position: relative; box-shadow: 0 4px 15px rgba(211, 0, 0, 0.3); }
        .btn-next { background: #00FF00; color: #000; margin-top: 15px; }
        .btn-skip { background: transparent; color: #555; border: 1px solid #222; font-size: 0.8rem; }

        #feedback { margin-top: 20px; min-height: 50px; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-align: center; color: #ffffff; }
        
        .hidden { display: none; }
        
        @media (max-width: 600px) { 
            .action-card { padding: 20px; }
            .exercise-block { padding: 30px 15px; }
            .pair-grid { flex-direction: column; gap: 15px; }
            .word-text { font-size: 1.8rem; }
            .ipa-text { font-size: 1rem; }
            .logo-bracket { width: 35px; height: 35px; } 
            .logo-bracket img { width: 30px; height: 30px; } 
            .header-title-container span { font-size: 0.9rem; }
            .header-right { gap: 10px; }
            #counter { font-size: 0.85rem; }
            .translation-small { font-size: 1rem; }
        }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0.7); } 70% { box-shadow: 0 0 0px 20px rgba(211, 0, 0, 0); } 100% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0); } }
        .listening-active { animation: pulse-red 1.5s infinite; background-color: #ff0000 !important; }
    </style>
</head>
<body>

<div class="action-card">
    <div class="section-header">
        <div class="header-title-container">
            <div class="logo-bracket"><img src="https://drive.google.com/thumbnail?id=1DQWHMZf7MpnzZBa3CbqqyJGLQEK6U4lZ" alt="Kira"></div>
            <span>Minimal Pairs Challenge</span>
        </div>
        <div class="header-right">
            <span id="counter">1 / 20</span>
        </div>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="quiz-area">
        <div class="exercise-block">
            <p style="font-size: 0.9rem; color: #888; margin-top: 0; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Pronuncia una de las dos palabras:</p>
            
            <div class="pair-grid">
                <div class="word-box" id="box1">
                    <span class="word-text" id="w1">Soda</span>
                    <span class="ipa-text" id="ipa1">/ˈsoʊdə/</span>
                    <div class="translation-small blur" onclick="this.classList.toggle('blur')" id="s1">Soda</div>
                </div>
                <div class="word-box" id="box2">
                    <span class="word-text" id="w2">Sir</span>
                    <span class="ipa-text" id="ipa2">/sɜːr/</span>
                    <div class="translation-small blur" onclick="this.classList.toggle('blur')" id="s2">Señor</div>
                </div>
            </div>

            <button class="btn-speak" id="mic" onclick="start()">Presiona y Habla 🎤</button>
            
            <div id="feedback">Listo para escuchar.</div>

            <button id="next" class="btn-next hidden" onclick="go()">Siguiente Par ➔</button>
            <button id="skip" class="btn-skip" onclick="go()">Saltar Par</button>
        </div>
    </div>
</div>

<script>
    const data = [
        { a: "soda", b: "sir", ipaA: "/ˈsoʊdə/", ipaB: "/sɜːr/", sA: "Soda", sB: "Señor" },
        { a: "bird", b: "beer", ipaA: "/bɜːrd/", ipaB: "/bɪər/", sA: "Pájaro", sB: "Cerveza" },
        { a: "bought", b: "boat", ipaA: "/bɔːt/", ipaB: "/boʊt/", sA: "Compró", sB: "Bote" },
        { a: "not", b: "note", ipaA: "/nɒt/", ipaB: "/noʊt/", sA: "No", sB: "Nota" },
        { a: "cup", b: "cap", ipaA: "/kʌp/", ipaB: "/kæp/", sA: "Taza", sB: "Gorra" },
        { a: "dark", b: "duck", ipaA: "/dɑːrk/", ipaB: "/dʌk/", sA: "Oscuro", sB: "Pato" },
        { a: "cat", b: "cut", ipaA: "/kæt/", ipaB: "/kʌt/", sA: "Gato", sB: "Cortar" },
        { a: "bed", b: "bad", ipaA: "/bed/", ipaB: "/bæd/", sA: "Cama", sB: "Malo" },
        { a: "ship", b: "sheep", ipaA: "/ʃɪp/", ipaB: "/ʃiːp/", sA: "Barco", sB: "Oveja" },
        { a: "sheet", b: "shit", ipaA: "/ʃiːt/", ipaB: "/ʃɪt/", sA: "Hoja / Sábana", sB: "Mierda" },
        { a: "pool", b: "pull", ipaA: "/puːl/", ipaB: "/pʊl/", sA: "Piscina", sB: "Jalar" },
        { a: "book", b: "buck", ipaA: "/bʊk/", ipaB: "/bʌk/", sA: "Libro", sB: "Dólar / Macho" },
        { a: "cot", b: "coat", ipaA: "/kɒt/", ipaB: "/koʊt/", sA: "Catre", sB: "Abrigo" },
        { a: "heart", b: "hurt", ipaA: "/hɑːrt/", ipaB: "/hɜːrt/", sA: "Corazón", sB: "Herir" },
        { a: "hot", b: "hat", ipaA: "/hɒt/", ipaB: "/hæt/", sA: "Caliente", sB: "Sombrero" },
        { a: "live", b: "leave", ipaA: "/lɪv/", ipaB: "/liːv/", sA: "Vivir", sB: "Salir / Dejar" },
        { a: "fill", b: "feel", ipaA: "/fɪl/", ipaB: "/fiːl/", sA: "Llenar", sB: "Sentir" },
        { a: "men", b: "man", ipaA: "/men/", ipaB: "/mæn/", sA: "Hombres", sB: "Hombre" },
        { a: "bus", b: "boss", ipaA: "/bʌs/", ipaB: "/bɔːs/", sA: "Autobús", sB: "Jefe" },
        { a: "luck", b: "look", ipaA: "/lʌk/", ipaB: "/lʊk/", sA: "Suerte", sB: "Mirar" }
    ];

    let idx = 0;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = Recognition ? new Recognition() : null;
    if(rec) { rec.lang = 'en-US'; rec.continuous = false; }

    function start() {
        if (!rec) return alert("Micro no compatible.");
        resetBoxes();
        try { rec.start(); } catch(e) {}
        const micBtn = document.getElementById('mic');
        micBtn.classList.add('listening-active');
        micBtn.innerText = "Escuchando... 🎤";
    }

    if(rec) {
        rec.onresult = (e) => {
            const heard = e.results[0][0].transcript.toLowerCase().trim();
            const wordA = data[idx].a.toLowerCase();
            const wordB = data[idx].b.toLowerCase();
            const fb = document.getElementById('feedback');

            if (heard.includes(wordA)) {
                document.getElementById('box1').classList.add('active');
                fb.innerHTML = `<span style="color:#00FF00">Entendí: "${data[idx].a}" ✅</span>`;
                showNext();
            } else if (heard.includes(wordB)) {
                document.getElementById('box2').classList.add('active');
                fb.innerHTML = `<span style="color:#00FF00">Entendí: "${data[idx].b}" ✅</span>`;
                showNext();
            } else {
                fb.innerHTML = `<span style="color:#D30000">Escuché: "${heard}"... intenta de nuevo. ❌</span>`;
            }
        };

        rec.onend = () => {
            const micBtn = document.getElementById('mic');
            micBtn.classList.remove('listening-active');
            micBtn.innerText = "Presiona y Habla 🎤";
        };
    }

    function showNext() {
        document.getElementById('next').classList.remove('hidden');
        document.getElementById('skip').classList.add('hidden');
    }

    function resetBoxes() {
        document.getElementById('box1').classList.remove('active');
        document.getElementById('box2').classList.remove('active');
    }

    function go() {
        idx++;
        if (idx < data.length) {
            document.getElementById('w1').innerText = data[idx].a.charAt(0).toUpperCase() + data[idx].a.slice(1);
            document.getElementById('w2').innerText = data[idx].b.charAt(0).toUpperCase() + data[idx].b.slice(1);
            document.getElementById('ipa1').innerText = data[idx].ipaA;
            document.getElementById('ipa2').innerText = data[idx].ipaB;
            document.getElementById('s1').innerText = data[idx].sA;
            document.getElementById('s2').innerText = data[idx].sB;
            
            document.querySelectorAll('.translation-small').forEach(el => el.classList.add('blur'));
            resetBoxes();
            
            document.getElementById('counter').innerText = `${idx + 1} / ${data.length}`;
            document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('skip').classList.remove('hidden');
            document.getElementById('feedback').innerHTML = "Listo.";
        } else {
            document.getElementById('quiz-area').innerHTML = `<div class="exercise-block"><h2 style="color:#00FF00">¡RETO COMPLETADO!</h2><button class="btn-speak" onclick="location.reload()">REINICIAR</button></div>`;
        }
    }

    document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
</script>
</body>
</html>

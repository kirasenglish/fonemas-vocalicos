<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Pairs Challenge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .action-card { background: #000; border-left: 4px solid #D30000; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 95%; max-width: 450px; text-align: center; }
        .pair-container { display: flex; justify-content: space-around; margin: 30px 0; gap: 15px; }
        .word-box { flex: 1; background: #111; padding: 20px; border-radius: 8px; border: 2px solid #222; transition: 0.3s; }
        .word-box.active { border-color: #00FF00; background: #0a250a; transform: scale(1.05); }
        .word-box.error { border-color: #D30000; opacity: 0.5; }
        .word-text { font-size: 1.5rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .ipa-text { color: #D30000; font-size: 0.9rem; }
        
        .btn-speak { background: #D30000; color: white; padding: 15px; width: 80%; border-radius: 50px; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .listening { animation: pulse-red 1.5s infinite; background-color: #ff0000; }
        
        #feedback { margin-top: 20px; font-weight: 700; min-height: 40px; color: #888; text-transform: uppercase; font-size: 0.8rem; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0.7); } 70% { box-shadow: 0 0 0px 20px rgba(211, 0, 0, 0); } 100% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0); } }
    </style>
</head>
<body>

<div class="action-card">
    <h2 style="font-size: 1rem; color: #D30000;">MINIMAL PAIRS CHALLENGE</h2>
    <p style="font-size: 0.8rem;">Dí una de las dos palabras:</p>

    <div class="pair-container">
        <div class="word-box" id="box1">
            <span class="word-text" id="w1">Ship</span>
            <span class="ipa-text">/ʃɪp/</span>
        </div>
        <div class="word-box" id="box2">
            <span class="word-text" id="w2">Sheep</span>
            <span class="ipa-text">/ʃiːp/</span>
        </div>
    </div>

    <button class="btn-speak" id="mic" onclick="startRecognition()">Presiona y Habla 🎤</button>
    
    <div id="feedback">Listo para escuchar...</div>
    
    <button onclick="nextPair()" style="background: transparent; color: #555; border: none; cursor: pointer; margin-top: 20px; font-size: 0.7rem; text-decoration: underline;">Siguiente par ➔</button>
</div>

<script>
    const pairs = [
        { a: "ship", b: "sheep" },
        { a: "bit", b: "beat" },
        { a: "fit", b: "feet" },
        { a: "sit", b: "seat" },
        { a: "grin", b: "green" }
    ];
    let current = 0;

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new Recognition();
    rec.lang = 'en-US';

    function startRecognition() {
        rec.start();
        const btn = document.getElementById('mic');
        btn.classList.add('listening');
        btn.innerText = "Escuchando...";
        resetBoxes();
    }

    rec.onresult = (e) => {
        const heard = e.results[0][0].transcript.toLowerCase().trim();
        const word1 = pairs[current].a;
        const word2 = pairs[current].b;
        const fb = document.getElementById('feedback');

        if (heard === word1) {
            document.getElementById('box1').classList.add('active');
            fb.innerHTML = `<span style="color:#00FF00">Entendí: "${word1}" (I corta)</span>`;
        } else if (heard === word2) {
            document.getElementById('box2').classList.add('active');
            fb.innerHTML = `<span style="color:#00FF00">Entendí: "${word2}" (I larga)</span>`;
        } else {
            fb.innerHTML = `<span style="color:#D30000">Dijiste: "${heard}"... intenta ser más claro.</span>`;
        }
    };

    rec.onend = () => {
        const btn = document.getElementById('mic');
        btn.classList.remove('listening');
        btn.innerText = "Presiona y Habla 🎤";
    };

    function resetBoxes() {
        document.getElementById('box1').className = "word-box";
        document.getElementById('box2').className = "word-box";
    }

    function nextPair() {
        current = (current + 1) % pairs.length;
        document.getElementById('w1').innerText = pairs[current].a.charAt(0).toUpperCase() + pairs[current].a.slice(1);
        document.getElementById('w2').innerText = pairs[current].b.charAt(0).toUpperCase() + pairs[current].b.slice(1);
        resetBoxes();
        document.getElementById('feedback').innerText = "Nuevo par listo.";
    }
</script>

</body>
</html>
